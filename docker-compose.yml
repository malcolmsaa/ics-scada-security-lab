services:
  modbus-server:
    image: python:3.11-slim
    container_name: modbus-server
    working_dir: /app
    volumes:
      - ./modbus_server.py:/app/modbus_server.py:ro
    command: sh -c "pip install pymodbus==3.6.3 && python /app/modbus_server.py"
    ports:
      - "502:502"
    networks:
      ot-zone:
        ipv4_address: 172.30.50.10
    restart: unless-stopped

  jumpserver:
    image: ubuntu:22.04
    container_name: jump-server
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    command: >
      bash -c "
      apt-get update &&
      DEBIAN_FRONTEND=noninteractive apt-get install -y
      openssh-server
      iptables
      iproute2
      tcpdump
      python3
      python3-pip
      iputils-ping
      netcat-openbsd
      curl &&
      mkdir -p /run/sshd &&
      useradd -m -s /bin/bash otadmin || true &&
      echo 'otadmin:LabPass2026!' | chpasswd &&
      sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
      grep -q '^PasswordAuthentication yes' /etc/ssh/sshd_config || echo 'PasswordAuthentication yes' >> /etc/ssh/sshd_config &&
      /usr/sbin/sshd &&
      tail -f /dev/null
      "
    networks:
      it-zone:
        ipv4_address: 172.30.10.10
      dmz:
        ipv4_address: 172.30.30.10
      ot-zone:
        ipv4_address: 172.30.50.100
    restart: unless-stopped

  it-workstation:
    image: ubuntu:22.04
    container_name: it-workstation
    command: >
      bash -c "
      apt-get update &&
      DEBIAN_FRONTEND=noninteractive apt-get install -y
      openssh-client
      curl
      nmap
      iputils-ping
      netcat-openbsd
      python3
      python3-pip
      jq &&
      tail -f /dev/null
      "
    networks:
      it-zone:
        ipv4_address: 172.30.10.50
    restart: unless-stopped

networks:
  it-zone:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.10.0/24
          gateway: 172.30.10.1

  dmz:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.30.0/24
          gateway: 172.30.30.1

  ot-zone:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.50.0/24
          gateway: 172.30.50.1
